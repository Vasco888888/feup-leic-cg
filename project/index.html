<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return to the Barn</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="hud-tl">
            <div class="hud-item hud-hp">
                <span class="hud-label">HP</span>
                <span class="hud-value" id="hud-hp-value">100</span>
            </div>
            <div class="hud-item hud-bales">
                <span class="hud-label">Bales</span>
                <span class="hud-value" id="hud-bales-value">0</span>
            </div>
        </div>
        <div id="hud-tc">
            <div class="hud-item hud-score">
                <span class="hud-label">Score</span>
                <span class="hud-value" id="hud-score-value">0</span>
            </div>
        </div>
    </div>
    <div id="menu">
        <img class="menu-logo" src="images/logo.png" alt="Return to the Barn">
        <button id="menu-play" type="button">Play</button>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
